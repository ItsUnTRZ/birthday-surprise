<style>
        body {
            background: linear-gradient(135deg, #fff8f9 0%, #ffe8f2 100%);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .gift-container {
            perspective: 1000px;
        }

        .gift-box {
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .gift-box:active {
            transform: scale(0.95);
        }

        .floating-heart {
            position: absolute;
            pointer-events: none;
            opacity: 0.4;
            animation: float-up 6s infinite linear;
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .pulse-glow {
            animation: pulse-glow 2s infinite ease-in-out;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 182, 217, 0.3); transform: scale(1); }
            50% { box-shadow: 0 0 40px rgba(255, 182, 217, 0.6); transform: scale(1.05); }
        }

        .sparkle {
            position: absolute;
            background: white;
            border-radius: 50%;
            pointer-events: none;
            animation: sparkle-anim 2s infinite;
        }

        @keyframes sparkle-anim {
            0%, 100% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="font-body-base text-on-surface flex justify-center items-start" style="background: linear-gradient(135deg, rgb(255, 248, 249) 0%, rgb(255, 232, 242) 100%); min-height: 100vh; margin: 0px; padding: 0px;">
<div class="app-container w-full min-h-screen max-w-md relative bg-background shadow-2xl flex flex-col justify-between overflow-hidden">
    <!-- Progress Bar -->
    <div class="fixed top-0 left-1/2 -translate-x-1/2 max-w-md w-full h-1 z-[60] bg-surface-container-low">
        <div class="h-full bg-gradient-to-r from-primary to-secondary w-0 transition-all duration-100" id="scrollProgress"></div>
    </div>


    <!-- Background Decoration -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0" id="particles-container">
        <!-- Particles will be generated by script -->
    </div>

    <!-- Main Canvas -->
    <main class="relative min-h-screen flex flex-col items-center justify-center flex-grow px-gutter z-10 pb-20">
        <!-- Center Stage: The Gift -->
        <div class="gift-container flex flex-col items-center gap-24 mt-4">
            <!-- Opening Message -->
            <div class="text-center space-y-4 animate-in fade-in slide-in-from-bottom duration-1000" id="title-message">
                <p class="font-label-caps text-label-caps text-primary tracking-widest uppercase">สุขสันต์วันเกิด!</p>
                <h2 class="font-display-lg-mobile md:font-display-lg text-display-lg-mobile md:text-display-lg text-primary">มีบางอย่างที่พิเศษรอคุณอยู่...</h2>
            </div>
            <!-- 3D Style Gift Box -->
            <a class="gift-box w-64 h-64 relative pulse-glow group block" href="#" id="gift-box" onclick="event.preventDefault(); triggerSurprise();">
                <!-- The Lid & Ribbon -->
                <div class="absolute inset-0 bg-primary-container rounded-xl shadow-xl z-20 border-4 border-surface-container-high overflow-hidden">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-12 h-full bg-[#ffd700] shadow-inner"></div>
                    <div class="absolute top-1/2 left-0 -translate-y-1/2 w-full h-12 bg-[#ffd700] shadow-inner"></div>
                    <div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#864c6a 2px, transparent 2px); background-size: 20px 20px;"></div>
                </div>
                <!-- Golden Bow/Ribbon Loops -->
                <div class="absolute -top-12 left-1/2 -translate-x-1/2 z-30 flex gap-0">
                    <div class="w-16 h-16 border-8 border-[#ffd700] rounded-[50%_50%_0%_50%] rotate-45 shadow-lg bg-[#ffe135]"></div>
                    <div class="w-16 h-16 border-8 border-[#ffd700] rounded-[50%_50%_50%_0%] -rotate-45 shadow-lg bg-[#ffe135] -ml-4"></div>
                </div>
                <!-- Interaction Hint -->
                <div class="absolute -bottom-16 left-1/2 -translate-x-1/2 w-max text-center">
                    <span class="font-body-bold text-body-bold text-primary group-hover:scale-110 transition-transform block">แตะเพื่อเปิด</span>
                    <div class="mt-2 flex justify-center gap-1">
                        <div class="w-2 h-2 rounded-full bg-primary animate-bounce"></div>
                        <div class="w-2 h-2 rounded-full bg-primary animate-bounce [animation-delay:0.2s]"></div>
                        <div class="w-2 h-2 rounded-full bg-primary animate-bounce [animation-delay:0.4s]"></div>
                    </div>
                </div>
                <div class="absolute inset-0 bg-white/20 z-20 pointer-events-none rounded-xl"></div>
            </a>
            <!-- Call to Action -->
            <div class="hidden opacity-0 transform translate-y-8 transition-all duration-700 text-center space-y-6" id="success-message">
                <div class="bg-surface-container-low/90 backdrop-blur-lg p-8 rounded-3xl shadow-[0_8px_30px_rgba(255,182,217,0.3)] border-2 border-primary-fixed max-w-sm mx-auto">
                    <h3 class="font-headline-md text-headline-md text-primary mb-2">เซอร์ไพรส์! 🎈</h3>
                    <p class="font-body-base text-on-surface-variant">การเดินทางแห่งความทรงจำและความมหัศจรรย์ของคุณเริ่มต้นขึ้นแล้ว คุณพร้อมหรือยัง?</p>
                </div>
                <button onclick="window.location.href='3_Birthday%20Letter%20(Thai).html'" class="bg-gradient-to-r from-primary to-secondary text-on-primary px-10 py-4 rounded-full font-body-bold text-body-bold shadow-lg hover:scale-110 transition-all pulse-glow">
                    อ่านจดหมายของฉัน ✉️
                </button>
            </div>
        </div>
    </main>


</div>

<!-- Success Confetti/Particle Scene -->
<div class="fixed inset-0 pointer-events-none z-40" id="confetti-overlay"></div>

<script>
        // Background heart generator
        const particlesContainer = document.getElementById('particles-container');
        const icons = ['favorite', 'auto_awesome', 'celebration', 'flutter_dash'];
        
        function createParticle() {
            if(!particlesContainer) return;
            const particle = document.createElement('span');
            particle.className = 'material-symbols-outlined floating-heart text-primary-container';
            particle.innerText = icons[Math.floor(Math.random() * icons.length)];
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.fontSize = (Math.random() * 20 + 20) + 'px';
            particle.style.animationDuration = (Math.random() * 4 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';
            particlesContainer.appendChild(particle);
            
            particle.addEventListener('animationend', () => {
                particle.remove();
            });
        }

        for(let i = 0; i < 15; i++) {
            createParticle();
        }
        setInterval(createParticle, 2000);

        // Sparkle generator for the gift box
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            const size = Math.random() * 8 + 4;
            sparkle.style.width = size + 'px';
            sparkle.style.height = size + 'px';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            sparkle.style.background = '#ffd700';
            sparkle.style.boxShadow = '0 0 10px #ffd700';
            document.body.appendChild(sparkle);
            setTimeout(() => sparkle.remove(), 2000);
        }

        // Trigger Surprise Animation
        function triggerSurprise() {
            const box = document.getElementById('gift-box');
            const success = document.getElementById('success-message');
            const titleMsg = document.getElementById('title-message');
            
            box.style.transform = 'scale(1.2) rotate(5deg)';
            setTimeout(() => {
                box.style.transform = 'scale(0) rotate(-20deg)';
                box.style.opacity = '0';
                if(titleMsg) {
                    titleMsg.style.display = 'none';
                }
                
                success.classList.remove('hidden');
                setTimeout(() => {
                    success.classList.add('opacity-100', 'translate-y-0');
                }, 100);

                createConfetti();
            }, 600);
        }

        function createConfetti() {
            const overlay = document.getElementById('confetti-overlay');
            for(let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'absolute w-3 h-3 rounded-sm';
                    const colors = ['#864c6a', '#fab1d4', '#ffd700', '#9b3e60'];
                    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    c.style.left = '50%';
                    c.style.top = '40%';
                    
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = 8 + Math.random() * 15;
                    const vx = Math.cos(angle) * velocity;
                    const vy = Math.sin(angle) * velocity - 5;
                    
                    let posX = 0;
                    let posY = 0;
                    let gravity = 0.3;
                    let currentVy = vy;
                    
                    const move = setInterval(() => {
                        posX += vx;
                        posY += currentVy;
                        currentVy += gravity;
                        c.style.transform = `translate(${posX}px, ${posY}px) rotate(${posX}deg)`;
                        if(posY > window.innerHeight) {
                            clearInterval(move);
                            c.remove();
                        }
                    }, 16);
                    overlay.appendChild(c);
                }, i * 15);
            }
        }
        // Scroll Progress Handler
        window.addEventListener('scroll', () => {
            const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = height > 0 ? (winScroll / height) * 100 : 0;
            const progress = document.getElementById("scrollProgress");
            if(progress) progress.style.width = scrolled + "%";
        });
    </script>
</body></html>
